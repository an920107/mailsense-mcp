apiVersion: v1
kind: Pod
metadata:
  name: mailsense
spec:
  containers:
    - name: postgres
      image: docker.io/pgvector/pgvector:pg18
      env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: trust
        - name: POSTGRES_DB
          value: mailsense
      ports:
        - containerPort: 5432
          hostPort: 5432
          hostIP: 127.0.0.1
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: postgres-data
      hostPath:
        path: ./postgres-data
        type: DirectoryOrCreate
